global
  maxconn 2000

defaults
  mode http
  timeout connect 5s
  timeout client 30s
  timeout server 30s

frontend http_front
  bind *:8080
  default_backend benchmark_backends

backend benchmark_backends
  balance roundrobin
  option httpchk GET /health
  http-check expect status 200
  server backend_a backend-a:8080 check
  server backend_b backend-b:8080 check
  server backend_c backend-c:8080 check
