events {}

http {
  upstream benchmark_backend {
    server backend-a:8080;
    server backend-b:8080;
    server backend-c:8080;
  }

  server {
    listen 8080;

    location / {
      proxy_http_version 1.1;
      proxy_set_header Connection "";
      proxy_set_header Host $host;
      proxy_pass http://benchmark_backend;
    }
  }
}
